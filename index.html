<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسبيح | المسبحة الرقمية العصرية</title>
    <meta name="description" content="تسبيح هو تطبيق فلاتر عصري وفاخر، مصمم ليقدم تجربة روحانية وسلسة للذكر مع واجهة Liquid Glass المميزة.">
    
    <!-- Google Fonts: Cairo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-bg: #FDF8F5;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(127, 103, 91, 0.15);
            --accent-color: #7F675B;
            --accent-light: #D97757;
            --text-main: #4A3B32;
            --text-dim: #6B5D54;
            --gold: #B8860B;
            --card-shadow: 0 8px 32px 0 rgba(127, 103, 91, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        html, body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            overflow-x: hidden;
            width: 100%;
            position: relative;
            line-height: 1.6;
        }

        /* Dynamic Background */
        .bg-gradient {
            /* position: fixed; */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 10% 10%, #F4EBE1 0%, transparent 40%),
                        radial-gradient(circle at 90% 90%, #E8DED3 0%, transparent 40%),
                        var(--primary-bg);
            z-index: -1;
        }

        /* Navbar */
        nav {
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: rgba(253, 248, 245, 0.7);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--glass-border);
            box-shadow: var(--card-shadow);
        }

        @media (min-width: 769px) {
            nav { padding: 1.2rem 8%; }
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-container img {
            width: 40px;
            height: 40px;
            border-radius: 10px;
        }

        .logo-text {
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: 1px;
            background: linear-gradient(to left, var(--accent-color), var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
        }

        /* Hero Section */
        header {
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem 5%;
            position: relative;
        }

        .hero-badge {
            background: rgba(127, 103, 91, 0.1);
            border: 1px solid var(--glass-border);
            padding: 0.6rem 2rem;
            border-radius: 100px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--accent-color);
            margin-bottom: 2.5rem;
            animation: fadeInDown 1s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            max-width: 90%;
            line-height: 1.4;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 900;
            margin-bottom: 1.5rem;
            line-height: 1.1;
            animation: fadeInUp 1s ease 0.2s forwards;
            opacity: 0;
            color: var(--text-main);
            text-shadow: 0 10px 20px rgba(127, 103, 91, 0.05);
        }

        .hero-desc {
            max-width: 750px;
            font-size: 1.3rem;
            color: var(--text-dim);
            margin-bottom: 3.5rem;
            animation: fadeInUp 1s ease 0.4s forwards;
            opacity: 0;
            line-height: 1.8;
        }

        .download-btn {
            background: linear-gradient(135deg, var(--accent-color), var(--accent-light));
            color: white;
            padding: 1.2rem 3rem;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.3rem;
            box-shadow: 0 10px 30px rgba(127, 103, 91, 0.2), inset 0 0 15px rgba(255, 255, 255, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 0.8rem;
            animation: fadeInUp 1s ease 0.6s forwards;
            opacity: 0;
            border: 1px solid rgba(255, 255, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .download-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            transition: 0.5s;
        }

        .download-btn:hover::after {
            left: 100%;
        }

        .download-btn:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 40px rgba(127, 103, 91, 0.3);
            filter: brightness(1.1);
        }

        .nav-download-btn {
            padding: 0.7rem 1.8rem;
            font-size: 1rem;
            animation: none;
            opacity: 1;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(127, 103, 91, 0.15);
        }

        @media (max-width: 768px) {
            .nav-download-btn {
                padding: 0.5rem 1.2rem;
                font-size: 0.9rem;
                width: auto;
            }
        }

        @media (max-width: 400px) {
            .nav-download-btn {
                display: none; /* Hide in navbar on very small screens to give room for logo */
            }
        }

        /* Preview Banner */
        .app-preview {
            margin-top: 5rem;
            width: 100%;
            max-width: 1000px;
            perspective: 1000px;
            animation: fadeIn 2s ease 1s forwards;
            opacity: 0;
        }

        .app-preview img {
            width: 100%;
            height: auto;
            border-radius: 40px;
            box-shadow: 0 40px 80px rgba(127, 103, 91, 0.15);
            transform: rotateX(8deg);
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(5px);
        }

        .app-preview:hover img {
            transform: rotateX(0deg) scale(1.02);
        }

        /* Features Section */
        .features {
            padding: 8rem 5%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: clamp(1.5rem, 4vw, 2.5rem);
            max-width: 1200px;
            margin: 0 auto;
        }

        .feature-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 2.5rem;
            border-radius: 30px;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: right;
            box-shadow: var(--card-shadow);
            position: relative;
            overflow: hidden;
        }

        .feature-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 100%);
            z-index: -1;
        }

        .feature-card:hover {
            transform: translateY(-12px) scale(1.02);
            background: rgba(255, 255, 255, 0.6);
            border-color: var(--accent-light);
            box-shadow: 0 20px 40px rgba(127, 103, 91, 0.15);
        }

        .feature-icon {
            font-size: 2.2rem;
            margin-bottom: 1.5rem;
            display: inline-flex;
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 15px;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 10px rgba(127, 103, 91, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .feature-card h3 {
            font-size: 1.6rem;
            margin-bottom: 1rem;
            color: var(--text-main);
            font-weight: 700;
        }

        .feature-card p {
            color: var(--text-dim);
            font-size: 1.05rem;
            line-height: 1.7;
        }

        /* Footer */
        footer {
            padding: 5rem 5%;
            text-align: center;
            border-top: 1px solid var(--glass-border);
            background: rgba(127, 103, 91, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        @media (max-width: 768px) {
            footer { padding: 3rem 5%; }
            .copyright { font-size: 0.8rem; }
        }

        .footer-logo {
            font-size: 1.8rem;
            font-weight: 900;
            margin-bottom: 1rem;
            display: block;
        }

        .copyright {
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        /* Floating Elements */
        .glass-orb {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.1) 100%);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255,255,255,0.3);
            z-index: -1;
            animation: float 20s infinite linear;
        }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, 50px) rotate(120deg); }
            66% { transform: translate(-20px, 20px) rotate(240deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 1200px) {
            h1 { font-size: clamp(2.2rem, 7vw, 3.5rem); }
            .hero-desc { max-width: 600px; }
        }

        @media (max-width: 1024px) {
            .features { padding: 6rem 5%; gap: 2rem; }
        }

        @media (max-width: 768px) {
            nav { padding: 0.8rem 5%; }
            .logo-text { font-size: 1.2rem; }
            .logo-container img { width: 32px; height: 32px; }
            
            header { padding: 4rem 5%; min-height: auto; }
            .hero-badge { font-size: 0.8rem; padding: 0.5rem 1.2rem; margin-bottom: 1.5rem; }
            h1 { font-size: 2.2rem; margin-bottom: 1rem; }
            h1 span { display: block; margin-top: 0.5rem; }
            .hero-desc { font-size: 1.05rem; margin-bottom: 2.5rem; }
            
            .download-btn { padding: 0.9rem 1.8rem; font-size: 1.1rem; width: 100%; justify-content: center; }
            
            .app-preview { margin-top: 3rem; }
            .app-preview img { border-radius: 20px; transform: rotateX(4deg); }
            
            .features { padding: 4rem 5%; grid-template-columns: 1fr; gap: 1.5rem; }
            .feature-card { padding: 1.8rem; border-radius: 20px; }
            
            .glass-orb { display: none !important; }
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            .hero-desc { font-size: 1rem; }
            .logo-text { font-size: 1rem; }
            .logo-container { gap: 0.4rem; }
            header { padding: 3rem 5%; }
            .feature-icon { width: 50px; height: 50px; font-size: 1.8rem; }
        }
        .logo{
            width: 200px;
        }
    </style>
</head>

    <script>
        // Simple Interaction logic
        document.getElementById('download-link').addEventListener('click', function(e) {
            // Check if there is an actual APK file to download
            // If not, we can show a coming soon or prompt
            console.log('Download requested');
            // For production: window.location.href = 'path/to/your/app.apk';
        });

        // Scroll animations (simple implementation)
        const observerOptions = {
            threshold: 0.1
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        }, observerOptions);

        document.querySelectorAll('.feature-card').forEach(card => {
            card.style.opacity = '0';
            card.style.transform = 'translateY(30px)';
            card.style.transition = 'all 0.6s ease-out';
            observer.observe(card);
        });
    </script>
